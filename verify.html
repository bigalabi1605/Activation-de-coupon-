<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérifier un coupon</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .verify-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            text-align: center;
        }
        .verify-box input {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
        }
        .verify-box button {
            padding: 15px 40px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .result-box {
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
        }
        .back-link {
            color: white;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="verify-container">
        <h1>🔍 Vérifier votre coupon</h1>
        
        <div class="verify-box">
            <input type="text" id="couponCode" placeholder="Entrez votre code" autocomplete="off">
            <button onclick="checkCoupon()">Vérifier</button>
        </div>
        
        <div id="result" class="result-box"></div>
        
        <a href="index.html" class="back-link">← Retour aux coupons</a>
    </div>

    <script>
        function checkCoupon() {
            const code = document.getElementById('couponCode').value;
            const result = document.getElementById('result');
            
            if (!code) {
                result.innerHTML = '❌ Veuillez entrer un code';
                result.style.background = 'rgba(244,67,54,0.2)';
                return;
            }
            
            // Simulation de vérification
            result.innerHTML = '⏳ Vérification...';
            
            setTimeout(() => {
                // 70% de chance d'être valide
                const valid = Math.random() > 0.3;
                const value = Math.floor(Math.random() * 100) + 10;
                
                if (valid) {
                    result.innerHTML = `✅ Coupon valide !<br>Valeur: ${value}€`;
                    result.style.background = 'rgba(76,175,80,0.2)';
                } else {
                    result.innerHTML = '❌ Coupon invalide ou expiré';
                    result.style.background = 'rgba(244,67,54,0.2)';
                }
            }, 1000);
        }
    </script>
</body>
  </html>
