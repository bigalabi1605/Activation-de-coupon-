<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification de Coupons</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Bannière de notifications -->
    <div class="notification-banner" id="notificationBanner">
        <p>📢 Veuillez autoriser les notifications pour accéder au site</p>
        <button id="allow-notifications">Autoriser</button>
    </div>

    <!-- En-tête -->
    <header>
        <h1>CouponVerify</h1>
        <p class="subtitle">Verify your coupons with one click</p>
    </header>

    <!-- Section des coupons -->
    <section class="coupons">
        <h2>Choose the type of coupon you want to verify:</h2>
        <div class="coupon-grid" id="couponGrid">
            <!-- Les coupons seront ajoutés ici par JavaScript -->
        </div>
    </section>

    <!-- Section des fonctionnalités -->
    <section class="features">
        <h2>Our features</h2>
        <div class="features-grid">
            <div class="feature-item">🌐 Multilingual</div>
            <div class="feature-item">🔒 Enhanced security</div>
            <div class="feature-item">📊 Verification history</div>
            <div class="feature-item">📱 Mobile app</div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
