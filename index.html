<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CouponVerify - Vérification de coupons</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- En-tête -->
    <div class="header">
        <h1>🎫 CouponVerify</h1>
        <p class="subtitle">Vérifiez vos coupons en un clic</p>
    </div>

    <!-- Grille des coupons -->
    <div class="coupon-grid" id="couponGrid"></div>

    <!-- Section features -->
    <div class="features">
        <h2>Nos fonctionnalités</h2>
        <div class="features-grid">
            <div class="feature">
                <span class="feature-icon">🌍</span>
                <h3>Multilingue</h3>
                <p>Traduction instantanée</p>
            </div>
            <div class="feature">
                <span class="feature-icon">🔒</span>
                <h3>Sécurité renforcée</h3>
                <p>Chiffrement avancé</p>
            </div>
            <div class="feature">
                <span class="feature-icon">📊</span>
                <h3>Historique</h3>
                <p>Suivez vos vérifications</p>
            </div>
            <div class="feature">
                <span class="feature-icon">📱</span>
                <h3>Application mobile</h3>
                <p>Vérifiez partout</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
